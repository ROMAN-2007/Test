<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>DashBord</title>
  <link rel="stylesheet" href="dashbord.css">

<body>

  <nav class="navbar">
    <h1>Romles</h1>
<div class="photo-container">
    <img id="preview" src="default.jpg" alt="Photo" class="photo">
    <label for="fileInput" class="add-photo">+</label>
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
</div>
<script>
  document.getElementById("fileInput").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("preview").src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});
</script>
    <ul>
      <li>
        <button id="themeToggle"><ion-icon name="moon"></ion-icon></button>
      </li>
      <li>
        <a href="">Site</a>
      </li>

      <script src="js/theme.js"></script>
    </ul>
  </nav>
  <aside>
    <div>
      <a href=""> <ion-icon name="notifications-outline"></ion-icon></a>
      <span class="badge" id="notifBadge">0</span>
      <!-- <button id="addNotif">ajouter</button> -->
      <script src="js/notificate.js"></script>
      <div id="PremierTrait"></div>

      <a href="#users"> <ion-icon name="people-outline"></ion-icon>
      </a>
      <a href=""> <ion-icon name="settings-outline"></ion-icon>
      </a>
      <div class="LogFlooter">
        <div id="DeuxiemeTrait"></div><br>
        <a href=""> <ion-icon name="log-out-outline"></ion-icon>
        </a>
      </div>
  </aside>

  </div>
  </div>

<div id="home" class="hidden">

<script src="script.js"></script>
